<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>米可報價儀表板</title>
<style>
  .viz-root {
    --surface-1:      #fcfcfb;
    --page:           #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --card:           #ffffff;
    --series-1:       #2a78d6;  /* 米可報價 */
    --delta-good:     #006300;  /* 降價，對買家是好事 */
    --delta-bad:      #d03b3b;  /* 漲價 */
    --status-good:    #0ca30c;
    --status-critical:#d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    .viz-root {
      --surface-1:      #1a1a19;
      --page:           #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --baseline:       #383835;
      --border:         rgba(255,255,255,0.10);
      --card:           #14140f;
      --series-1:       #3987e5;
      --delta-good:     #0ca30c;
      --delta-bad:      #e66767;
      --status-good:    #0ca30c;
      --status-critical:#e66767;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
    background: var(--page);
    color: var(--text-primary);
    line-height: 1.5;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 16px 80px; }
  .top-nav { display: flex; justify-content: flex-end; margin-bottom: 8px; }
  .top-nav a { color: var(--text-muted); font-size: 0.85rem; text-decoration: none; }
  .top-nav a:hover { color: var(--series-1); }
  h1 { font-size: 1.4rem; margin: 0 0 4px; }
  .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin: 0 0 20px; }

  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .kpi {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px;
  }
  .kpi .label { font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 6px; }
  .kpi .value { font-size: 1.7rem; font-weight: 600; }
  .kpi .value.good { color: var(--delta-good); }
  .kpi .value.bad { color: var(--delta-bad); }

  .toolbar {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
    position: sticky; top: 0; background: var(--page); padding: 10px 0; z-index: 5;
  }
  input[type="search"], select {
    padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--text-primary); font-size: 0.9rem;
  }
  input[type="search"] { flex: 1; min-width: 180px; }
  .status-msg { color: var(--text-secondary); font-size: 0.9rem; padding: 40px 0; text-align: center; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 10px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; cursor: pointer;
  }
  .card:hover { border-color: var(--series-1); }
  .card.active { border-color: var(--series-1); box-shadow: 0 0 0 1px var(--series-1) inset; }
  .card .title { font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; min-height: 2.4em; }
  .card .price-row { display: flex; align-items: baseline; justify-content: space-between; }
  .card .price { font-size: 1.15rem; font-weight: 600; }
  .card .delta { font-size: 0.78rem; }
  .card .delta.good { color: var(--delta-good); }
  .card .delta.bad { color: var(--delta-bad); }
  .card .delta.flat { color: var(--text-muted); }
  .card svg.spark { display: block; margin-top: 6px; width: 100%; height: 32px; overflow: visible; }

  .detail {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px; margin: 20px 0;
  }
  .detail-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 4px; }
  .detail-head h3 { margin: 0; font-size: 1.05rem; }
  .detail-head button { background: none; border: none; color: var(--text-muted); font-size: 0.85rem; cursor: pointer; }
  .legend { display: flex; gap: 16px; font-size: 0.8rem; color: var(--text-secondary); margin: 4px 0 12px; }
  .legend-key { display: inline-flex; align-items: center; gap: 6px; }
  .legend-line { display: inline-block; width: 16px; height: 0; border-top: 2px solid; }
  .chart-wrap { position: relative; }
  .tooltip {
    position: absolute; pointer-events: none; background: var(--text-primary); color: var(--page);
    font-size: 0.78rem; padding: 6px 9px; border-radius: 6px; white-space: nowrap; opacity: 0;
    transform: translate(-50%, -110%); transition: opacity 0.1s;
  }
  .tooltip .v { font-weight: 700; }
  details.table-view { margin-top: 10px; }
  details.table-view summary { font-size: 0.8rem; color: var(--text-secondary); cursor: pointer; }
  table.history-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 8px; }
  table.history-table th, table.history-table td {
    text-align: right; padding: 4px 8px; border-bottom: 1px solid var(--gridline);
    font-variant-numeric: tabular-nums;
  }
  table.history-table th:first-child, table.history-table td:first-child { text-align: left; }

  .runlog { margin-top: 28px; }
  .runlog h2 { font-size: 1rem; margin: 0 0 10px; }
  table.runlog-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
  table.runlog-table th {
    text-align: left; color: var(--text-muted); font-weight: 500; font-size: 0.75rem;
    padding: 6px 8px; border-bottom: 1px solid var(--gridline);
  }
  table.runlog-table td { padding: 6px 8px; border-bottom: 1px solid var(--gridline); }
  table.runlog-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.8rem; }
  .badge .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .badge.ok .dot { background: var(--status-good); }
  .badge.fail .dot { background: var(--status-critical); }
  .badge.ok { color: var(--status-good); }
  .badge.fail { color: var(--status-critical); }
  .err-msg { color: var(--text-muted); font-size: 0.75rem; }
</style>
</head>
<body>
<div class="wrap viz-root">
  <div class="top-nav"><a href="./index.html">📱 前往選手機頁面 →</a></div>
  <h1>📊 米可報價儀表板</h1>
  <p class="subtitle">追蹤手機的價格走勢，以及排程抓取的執行紀錄。</p>

  <div class="kpi-row" id="kpiRow"></div>

  <div class="toolbar">
    <input type="search" id="search" placeholder="搜尋機型...">
    <select id="rangeSelect">
      <option value="7">近 7 天</option>
      <option value="30" selected>近 30 天</option>
      <option value="90">近 90 天</option>
      <option value="9999">全部</option>
    </select>
    <select id="sortSelect">
      <option value="dropPct">降價幅度（大→小）</option>
      <option value="risePct">漲價幅度（大→小）</option>
      <option value="name">名稱</option>
    </select>
  </div>

  <div id="statusMsg" class="status-msg">正在載入資料...</div>
  <div class="grid" id="grid"></div>

  <div id="detailContainer"></div>

  <div class="runlog">
    <h2>🛠️ 抓取執行紀錄</h2>
    <div id="runlogWrap"></div>
  </div>
</div>

<script>
(function () {
  const els = {
    kpiRow: document.getElementById('kpiRow'),
    search: document.getElementById('search'),
    rangeSelect: document.getElementById('rangeSelect'),
    sortSelect: document.getElementById('sortSelect'),
    statusMsg: document.getElementById('statusMsg'),
    grid: document.getElementById('grid'),
    detailContainer: document.getElementById('detailContainer'),
    runlogWrap: document.getElementById('runlogWrap')
  };

  let phones = [];
  let history = {};
  let statusLog = [];
  let deltaByTitle = new Map();
  let activeTitle = null;

  function fmtPrice(n) {
    return '$' + Number(n).toLocaleString('en-US');
  }

  function fmtRelative(iso) {
    if (!iso) return '—';
    const diffMs = Date.now() - new Date(iso).getTime();
    const min = Math.round(diffMs / 60000);
    if (min < 1) return '剛剛';
    if (min < 60) return min + ' 分鐘前';
    const hr = Math.round(min / 60);
    if (hr < 24) return hr + ' 小時前';
    return Math.round(hr / 24) + ' 天前';
  }

  // ---- 計算每支手機「較前一次記錄」的漲跌 ----
  function computeDeltas() {
    deltaByTitle = new Map();
    for (const p of phones) {
      const series = (history[p.title] || []).slice().sort((a, b) => a.date.localeCompare(b.date));
      if (series.length < 2) { deltaByTitle.set(p.title, null); continue; }
      const last = series[series.length - 1];
      const prev = series[series.length - 2];
      const deltaAbs = last.price - prev.price;
      const deltaPct = prev.price ? (deltaAbs / prev.price) * 100 : 0;
      deltaByTitle.set(p.title, { deltaAbs, deltaPct, prevPrice: prev.price });
    }
  }

  function renderKPIs() {
    const drops = [...deltaByTitle.values()].filter(d => d && d.deltaAbs < 0).length;
    const rises = [...deltaByTitle.values()].filter(d => d && d.deltaAbs > 0).length;
    const lastOk = [...statusLog].reverse().find(s => s.ok);
    const lastRun = statusLog.length ? statusLog[statusLog.length - 1] : null;

    const tiles = [
      { label: '追蹤手機數', value: String(phones.length) },
      { label: '較前次記錄降價', value: String(drops), cls: drops ? 'good' : '' },
      { label: '較前次記錄漲價', value: String(rises), cls: rises ? 'bad' : '' },
      { label: '最後成功更新', value: fmtRelative(lastOk && lastOk.at) }
    ];

    els.kpiRow.innerHTML = '';
    for (const t of tiles) {
      const div = document.createElement('div');
      div.className = 'kpi';
      div.innerHTML = `<div class="label"></div><div class="value ${t.cls || ''}"></div>`;
      div.querySelector('.label').textContent = t.label;
      div.querySelector('.value').textContent = t.value;
      els.kpiRow.appendChild(div);
    }

    if (lastRun && !lastRun.ok) {
      const warn = document.createElement('div');
      warn.className = 'kpi';
      warn.style.gridColumn = '1 / -1';
      warn.innerHTML = `<div class="label" style="color:var(--delta-bad)"></div>`;
      warn.querySelector('.label').textContent = '⚠️ 最新一次執行失敗：' + (lastRun.error || '未知錯誤');
      els.kpiRow.appendChild(warn);
    }
  }

  // ---- Sparkline（小卡片用，純線條，無互動） ----
  function buildSparkline(series, width, height) {
    if (series.length < 2) return '';
    const prices = series.map(pt => pt.price);
    const min = Math.min(...prices), max = Math.max(...prices);
    const span = max - min || 1;
    const stepX = width / (series.length - 1);
    const pts = series.map((pt, i) => {
      const x = i * stepX;
      const y = height - ((pt.price - min) / span) * height;
      return [x, y];
    });
    const d = pts.map((pt, i) => (i === 0 ? 'M' : 'L') + pt[0].toFixed(1) + ',' + pt[1].toFixed(1)).join(' ');
    const last = pts[pts.length - 1];
    return `<svg class="spark" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
      <path d="${d}" fill="none" stroke="var(--series-1)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
      <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3" fill="var(--series-1)" stroke="var(--card)" stroke-width="2"/>
    </svg>`;
  }

  function rangeDays() {
    return Number(els.rangeSelect.value);
  }

  function seriesForRange(title) {
    const all = (history[title] || []).slice().sort((a, b) => a.date.localeCompare(b.date));
    const days = rangeDays();
    if (days >= 9999) return all;
    const cutoff = new Date(Date.now() - days * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
    return all.filter(pt => pt.date >= cutoff);
  }

  function renderCards(list) {
    els.grid.innerHTML = '';
    if (!list.length) {
      els.statusMsg.textContent = phones.length ? '沒有符合搜尋條件的機型' : '目前還沒有報價資料，等排程第一次執行完成後會自動出現。';
      els.statusMsg.style.display = 'block';
      return;
    }
    els.statusMsg.style.display = 'none';

    const frag = document.createDocumentFragment();
    for (const p of list) {
      const delta = deltaByTitle.get(p.title);
      const card = document.createElement('div');
      card.className = 'card' + (p.title === activeTitle ? ' active' : '');
      const series = seriesForRange(p.title);

      let deltaHtml = '<span class="delta flat">尚無比較資料</span>';
      if (delta) {
        const cls = delta.deltaAbs < 0 ? 'good' : (delta.deltaAbs > 0 ? 'bad' : 'flat');
        const arrow = delta.deltaAbs < 0 ? '↓' : (delta.deltaAbs > 0 ? '↑' : '—');
        deltaHtml = `<span class="delta ${cls}">${arrow} ${fmtPrice(Math.abs(delta.deltaAbs))}（${delta.deltaPct.toFixed(1)}%）</span>`;
      }

      card.innerHTML = `
        <div class="title"></div>
        <div class="price-row">
          <span class="price"></span>
        </div>
        ${deltaHtml}
        ${buildSparkline(series, 200, 32)}
      `;
      card.querySelector('.title').textContent = p.title;
      card.querySelector('.price').textContent = fmtPrice(p.price);
      card.addEventListener('click', () => {
        activeTitle = (activeTitle === p.title) ? null : p.title;
        renderCards(list);
        if (activeTitle) renderDetail(p);
        else els.detailContainer.innerHTML = '';
      });
      frag.appendChild(card);
    }
    els.grid.appendChild(frag);
  }

  // ---- 展開的完整走勢圖（含 hover 十字線 + tooltip） ----
  function renderDetail(phone) {
    const series = seriesForRange(phone.title);
    els.detailContainer.innerHTML = '';
    const box = document.createElement('div');
    box.className = 'detail';

    if (series.length < 2) {
      box.innerHTML = `<div class="detail-head"><h3></h3><button>收起 ✕</button></div><p style="color:var(--text-secondary);font-size:0.85rem;">這支手機目前累積的歷史記錄還不夠畫走勢圖（至少要兩天不同日期的資料）。</p>`;
      box.querySelector('h3').textContent = phone.title;
      box.querySelector('button').addEventListener('click', () => { activeTitle = null; els.detailContainer.innerHTML = ''; renderCards(currentList()); });
      els.detailContainer.appendChild(box);
      return;
    }

    const W = 900, H = 240, padL = 54, padR = 16, padT = 16, padB = 28;
    const plotW = W - padL - padR, plotH = H - padT - padB;

    const prices = series.flatMap(pt => [pt.price, pt.msrp].filter(v => typeof v === 'number'));
    const min = Math.min(...prices), max = Math.max(...prices);
    const span = (max - min) || 1;
    const pad = span * 0.08;
    const yMin = Math.max(0, min - pad), yMax = max + pad;

    const x = i => padL + (i / (series.length - 1)) * plotW;
    const y = v => padT + plotH - ((v - yMin) / (yMax - yMin)) * plotH;

    const pricePath = series.map((pt, i) => (i === 0 ? 'M' : 'L') + x(i).toFixed(1) + ',' + y(pt.price).toFixed(1)).join(' ');
    const hasMsrp = series.some(pt => typeof pt.msrp === 'number');
    const msrpPath = hasMsrp ? series.map((pt, i) => (i === 0 ? 'M' : 'L') + x(i).toFixed(1) + ',' + y(pt.msrp != null ? pt.msrp : pt.price).toFixed(1)).join(' ') : '';

    // y 軸刻度：抓 4 個乾淨數字
    const ticks = 4;
    const tickVals = Array.from({ length: ticks + 1 }, (_, i) => yMin + (i / ticks) * (yMax - yMin));

    const gridSvg = tickVals.map(v => {
      const yy = y(v).toFixed(1);
      return `<line x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}" stroke="var(--gridline)" stroke-width="1"/>
              <text x="${padL - 8}" y="${yy}" text-anchor="end" dominant-baseline="middle" font-size="10" fill="var(--text-muted)">${fmtPrice(Math.round(v))}</text>`;
    }).join('');

    // X 軸：只標頭尾兩個日期，避免擁擠
    const xLabels = `
      <text x="${x(0)}" y="${H - 8}" text-anchor="start" font-size="10" fill="var(--text-muted)">${series[0].date}</text>
      <text x="${x(series.length - 1)}" y="${H - 8}" text-anchor="end" font-size="10" fill="var(--text-muted)">${series[series.length - 1].date}</text>
    `;

    const lastPt = series[series.length - 1];

    box.innerHTML = `
      <div class="detail-head">
        <h3></h3>
        <button>收起 ✕</button>
      </div>
      <div class="legend">
        <span class="legend-key"><span class="legend-line" style="border-color:var(--series-1)"></span>米可報價</span>
        ${hasMsrp ? '<span class="legend-key"><span class="legend-line" style="border-color:var(--text-muted);border-top-style:dashed"></span>原廠建議售價</span>' : ''}
      </div>
      <div class="chart-wrap">
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;">
          ${gridSvg}
          <line x1="${padL}" y1="${padT + plotH}" x2="${W - padR}" y2="${padT + plotH}" stroke="var(--baseline)" stroke-width="1"/>
          ${hasMsrp ? `<path d="${msrpPath}" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="4 3" stroke-linejoin="round" stroke-linecap="round"/>` : ''}
          <path d="${pricePath}" fill="none" stroke="var(--series-1)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          <circle cx="${x(series.length - 1).toFixed(1)}" cy="${y(lastPt.price).toFixed(1)}" r="4" fill="var(--series-1)" stroke="var(--card)" stroke-width="2"/>
          ${xLabels}
          <line class="crosshair" x1="0" y1="${padT}" x2="0" y2="${padT + plotH}" stroke="var(--text-muted)" stroke-width="1" opacity="0"/>
          <rect class="hit" x="${padL}" y="${padT}" width="${plotW}" height="${plotH}" fill="transparent"/>
        </svg>
        <div class="tooltip"></div>
      </div>
      <details class="table-view">
        <summary>以表格檢視原始資料</summary>
        <table class="history-table">
          <thead><tr><th>日期</th><th>米可報價</th>${hasMsrp ? '<th>原廠建議售價</th>' : ''}</tr></thead>
          <tbody></tbody>
        </table>
      </details>
    `;

    box.querySelector('h3').textContent = phone.title;
    box.querySelector('.detail-head button').addEventListener('click', () => {
      activeTitle = null;
      els.detailContainer.innerHTML = '';
      renderCards(currentList());
    });

    const tbody = box.querySelector('tbody');
    for (const pt of series.slice().reverse()) {
      const tr = document.createElement('tr');
      const cells = [pt.date, fmtPrice(pt.price)];
      if (hasMsrp) cells.push(pt.msrp != null ? fmtPrice(pt.msrp) : '—');
      for (const c of cells) {
        const td = document.createElement('td');
        td.textContent = c;
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }

    // hover 十字線 + tooltip
    const svg = box.querySelector('svg');
    const hitRect = box.querySelector('.hit');
    const crosshair = box.querySelector('.crosshair');
    const tooltip = box.querySelector('.tooltip');

    function pointerToIndex(clientX) {
      const rect = svg.getBoundingClientRect();
      const svgX = ((clientX - rect.left) / rect.width) * W;
      const rel = (svgX - padL) / plotW;
      const idx = Math.round(rel * (series.length - 1));
      return Math.min(series.length - 1, Math.max(0, idx));
    }

    function showAt(idx) {
      const pt = series[idx];
      const xx = x(idx);
      crosshair.setAttribute('x1', xx);
      crosshair.setAttribute('x2', xx);
      crosshair.setAttribute('opacity', '1');
      const rect = svg.getBoundingClientRect();
      const px = (xx / W) * rect.width;
      const py = (y(pt.price) / H) * rect.height;
      tooltip.style.left = px + 'px';
      tooltip.style.top = py + 'px';
      tooltip.style.opacity = '1';
      tooltip.innerHTML = '';
      const dateEl = document.createElement('div');
      dateEl.textContent = pt.date;
      const priceEl = document.createElement('div');
      priceEl.innerHTML = '<span class="v"></span> 米可報價';
      priceEl.querySelector('.v').textContent = fmtPrice(pt.price) + ' ';
      tooltip.appendChild(dateEl);
      tooltip.appendChild(priceEl);
      if (hasMsrp && pt.msrp != null) {
        const msrpEl = document.createElement('div');
        msrpEl.innerHTML = '<span class="v"></span> 原廠建議售價';
        msrpEl.querySelector('.v').textContent = fmtPrice(pt.msrp) + ' ';
        tooltip.appendChild(msrpEl);
      }
    }

    function hide() {
      crosshair.setAttribute('opacity', '0');
      tooltip.style.opacity = '0';
    }

    hitRect.addEventListener('pointermove', e => showAt(pointerToIndex(e.clientX)));
    hitRect.addEventListener('pointerleave', hide);
    showAt(series.length - 1);

    els.detailContainer.appendChild(box);
    box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function currentList() {
    const kw = els.search.value.trim().toLowerCase();
    let list = kw ? phones.filter(p => p.title.toLowerCase().includes(kw)) : phones.slice();

    const sortBy = els.sortSelect.value;
    list.sort((a, b) => {
      if (sortBy === 'name') return a.title.localeCompare(b.title, 'zh-Hant');
      const da = deltaByTitle.get(a.title), db = deltaByTitle.get(b.title);
      const pa = da ? da.deltaPct : 0, pb = db ? db.deltaPct : 0;
      return sortBy === 'dropPct' ? pa - pb : pb - pa;
    });
    return list;
  }

  function applyFilter() {
    renderCards(currentList());
  }

  function renderRunLog() {
    if (!statusLog.length) {
      els.runlogWrap.innerHTML = '<p style="color:var(--text-secondary);font-size:0.85rem;">還沒有執行紀錄。</p>';
      return;
    }
    const rows = statusLog.slice().reverse().slice(0, 15);
    const table = document.createElement('table');
    table.className = 'runlog-table';
    table.innerHTML = `<thead><tr><th>時間</th><th>狀態</th><th style="text-align:right">抓到手機數</th><th style="text-align:right">推播人數</th><th>備註</th></tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');
    for (const r of rows) {
      const tr = document.createElement('tr');
      const tdTime = document.createElement('td');
      tdTime.textContent = r.at ? new Date(r.at).toLocaleString('zh-TW', { hour12: false }) : '—';
      const tdStatus = document.createElement('td');
      tdStatus.innerHTML = r.ok ? '<span class="badge ok"><span class="dot"></span>成功</span>' : '<span class="badge fail"><span class="dot"></span>失敗</span>';
      const tdCount = document.createElement('td');
      tdCount.className = 'num';
      tdCount.textContent = r.phoneCount != null ? String(r.phoneCount) : '—';
      const tdPush = document.createElement('td');
      tdPush.className = 'num';
      tdPush.textContent = r.pushCount != null ? String(r.pushCount) : '—';
      const tdErr = document.createElement('td');
      tdErr.className = 'err-msg';
      tdErr.textContent = r.error || '';
      tr.appendChild(tdTime); tr.appendChild(tdStatus); tr.appendChild(tdCount); tr.appendChild(tdPush); tr.appendChild(tdErr);
      tbody.appendChild(tr);
    }
    els.runlogWrap.innerHTML = '';
    els.runlogWrap.appendChild(table);
  }

  els.search.addEventListener('input', applyFilter);
  els.sortSelect.addEventListener('change', applyFilter);
  els.rangeSelect.addEventListener('change', () => {
    applyFilter();
    if (activeTitle) {
      const p = phones.find(x => x.title === activeTitle);
      if (p) renderDetail(p);
    }
  });

  Promise.all([
    fetch('./phones.json', { cache: 'no-store' }).then(r => r.ok ? r.json() : []).catch(() => []),
    fetch('./history.json', { cache: 'no-store' }).then(r => r.ok ? r.json() : {}).catch(() => ({})),
    fetch('./status.json', { cache: 'no-store' }).then(r => r.ok ? r.json() : []).catch(() => [])
  ]).then(([phonesData, historyData, statusData]) => {
    phones = Array.isArray(phonesData) ? phonesData.filter(p => p && p.title) : [];
    history = historyData && typeof historyData === 'object' ? historyData : {};
    statusLog = Array.isArray(statusData) ? statusData : [];

    computeDeltas();
    renderKPIs();
    renderRunLog();

    if (!phones.length) {
      els.statusMsg.textContent = '目前還沒有報價資料，等排程第一次執行完成後會自動出現。';
      els.statusMsg.style.display = 'block';
      return;
    }
    applyFilter();
  }).catch(err => {
    els.statusMsg.textContent = '載入資料失敗：' + err.message;
    els.statusMsg.style.display = 'block';
  });
})();
</script>
</body>
</html>
