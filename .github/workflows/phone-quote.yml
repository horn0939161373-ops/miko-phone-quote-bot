name: 米可手機報價通知

on:
  schedule:
    # 已確認過：這個帳號的 schedule 觸發器目前不會自動動作（手動
    # workflow_dispatch 一律正常，但 cron 排程從沒被 GitHub 排進去執行
    # 過，橫跨 4 小時、每 5 分鐘的測試window 完全沒有任何一次自動觸發）。
    # cron 設定先照正式間隔（每小時）放著，等這個帳號的排程功能恢復
    # 正常就會照這個頻率跑；目前實務上要靠手動 workflow_dispatch。
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: phone-quote
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run phone quote script
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: node src/index.js

      - name: Commit updated data and state
        # 就算上面那個 step 失敗（例如抓取失敗），也要照樣把 docs/status.json
        # 裡記錄的失敗原因 commit 上去，後台儀表板的「抓取執行紀錄」才看得到
        # 這次失敗，而不是整批資料都不會更新。
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/phones.json docs/history.json docs/status.json state/last-prices.json
          git diff --cached --quiet && exit 0

          git commit -m "chore: 更新米可手機報價資料 [skip ci]"
          # 手動觸發跟排程觸發偶爾會重疊，push 前先 rebase 到最新 main 再重試，
          # 避免單純的 race condition 讓整次執行判定失敗。
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push 被拒絕（第 $i 次），rebase 到最新 main 後重試..."
            git pull --rebase origin main
          done
          echo "重試 5 次後仍 push 失敗" >&2
          exit 1
